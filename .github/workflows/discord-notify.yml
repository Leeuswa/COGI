name: Discord Notify

on:
  push:
    branches: ["**"]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Discord 알림
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "📦 새로운 푸시!"
          description: |
            **브랜치:** ${{ github.ref_name }}
            **커밋 메시지:** ${{ github.event.head_commit.message }}
            **작성자:** ${{ github.actor }}
          color: 0x5865F2
